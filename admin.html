<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
<title>VP Admin</title>
<style>
:root{--bg:#0b0b0d;--panel:#121318;--line:rgba(255,255,255,.07);--soft:#1a1d24;--txt:#e8ebf0;--muted:#9aa3b2;--acc:#0d7eff;--danger:#ff4d57;--ok:#31c46d}
*{box-sizing:border-box;font-family:Inter,system-ui,sans-serif}body{margin:0;background:var(--bg);color:var(--txt)}
.app{display:grid;grid-template-columns:252px 1fr;min-height:100vh}.side{padding:14px;border-right:1px solid var(--line);background:rgba(15,16,20,.92)}
.brand{font-size:20px;font-weight:800;margin:8px 8px 16px}.nav{display:flex;flex-direction:column;gap:6px}.nav button{all:unset;cursor:pointer;padding:11px 12px;border-radius:12px;color:var(--muted)}.nav button.active{background:rgba(13,126,255,.15);color:#fff}
.main{padding:18px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px}.card,.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px}.card{padding:14px}.k{font-size:12px;color:var(--muted)}.v{font-weight:800;font-size:28px;margin-top:2px}
.panel{padding:12px;margin-top:12px}.row{display:flex;gap:8px;flex-wrap:wrap}input,button{background:var(--soft);border:1px solid var(--line);color:var(--txt);border-radius:11px;padding:10px}button{cursor:pointer}
button.primary{background:linear-gradient(135deg,#0d7eff,#23d4f9);border:none;color:#fff}button.danger{background:rgba(255,77,87,.16);border-color:rgba(255,77,87,.45)}button.ok{background:rgba(49,196,109,.16);border-color:rgba(49,196,109,.45)}
.g{flex:1}.list{display:flex;flex-direction:column;gap:8px;max-height:67vh;overflow:auto}.item{background:#171a21;border:1px solid var(--line);border-radius:11px;padding:10px}.muted{color:var(--muted);font-size:12px}
.hidden{display:none!important}.login{position:fixed;inset:0;background:rgba(7,8,12,.96);display:flex;align-items:center;justify-content:center;z-index:30}.login-box{width:min(420px,92vw);background:var(--panel);border:1px solid var(--line);border-radius:15px;padding:16px}
.badge{height:14px;vertical-align:middle;margin-left:4px}
@media(max-width:900px){.app{grid-template-columns:1fr}.side{position:sticky;top:0;z-index:5}}
</style>
</head>
<body>
<div class="login" id="login"><div class="login-box"><h2>Вход в админ панель</h2><div class="row"><input id="pw" type="password" class="g" placeholder="Пароль"><button class="primary" onclick="login()">Войти</button></div><p id="e" class="muted"></p></div></div>
<div class="app">
<aside class="side"><div class="brand">VP Admin</div><nav class="nav">
<button data-t="home" class="active">Главная</button><button data-t="posts">Посты</button><button data-t="users">Пользователи</button><button data-t="pre">Предверификация</button><button data-t="mod">Модерация</button>
</nav></aside>
<main class="main">
<section id="home"><div id="stats" class="grid"></div><div class="panel"><h3>Системные логи</h3><div id="logs" class="list"></div></div></section>
<section id="posts" class="hidden"><div class="row"><input id="qPost" class="g" placeholder="Поиск по постам"><button class="primary" onclick="loadPosts()">Найти</button></div><div class="panel"><h3>Посты</h3><div id="postList" class="list"></div></div><div class="panel"><h3>Архив (24ч)</h3><div id="arch" class="list"></div></div></section>
<section id="users" class="hidden"><div class="row"><input id="qUser" class="g" placeholder="Поиск по имени/username"><button class="primary" onclick="loadUsers()">Найти</button></div><div class="panel"><h3>Пользователи</h3><div id="userList" class="list"></div></div></section>
<section id="pre" class="hidden"><div class="row"><input id="preIn" class="g" placeholder="username"><button class="primary" onclick="preAdd()">Добавить</button></div><div class="panel"><div id="preList" class="list"></div></div></section>
<section id="mod" class="hidden"><div class="row"><input id="alias" class="g" placeholder="Псевдоним"><button class="primary" onclick="mkCreate()">Создать ключ</button></div><div class="panel"><h3>Ключи доступа</h3><div id="mkList" class="list"></div></div><div class="panel"><h3>Логи модераторов</h3><div id="mLogs" class="list"></div></div></section>
</main></div>
<script>
const TK='vp_admin_token'; const $=s=>document.querySelector(s); const f=v=>new Date(v).toLocaleString('ru-RU');
const api=async(u,o={})=>{const r=await fetch(u,{...o,headers:{'Content-Type':'application/json','Authorization':'Bearer '+(localStorage.getItem(TK)||'')}});const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||'Ошибка');return d};
async function login(){try{const d=await fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:$('#pw').value})}).then(r=>r.json());if(!d.token)throw new Error(d.error||'Ошибка');localStorage.setItem(TK,d.token);$('#login').classList.add('hidden');init()}catch(e){$('#e').textContent=e.message}}
function nav(){document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'));b.classList.add('active');['home','posts','users','pre','mod'].forEach(t=>document.getElementById(t).classList.toggle('hidden',t!==b.dataset.t));})}
async function loadHome(){const d=await api('/api/admin/dashboard');$('#stats').innerHTML=[['Пользователи',d.stats.usersCompact],['Онлайн в приложении',d.stats.onlineUsersCompact],['Посты',d.stats.postsCompact],['Заблокированы',d.stats.blockedUsersCompact]].map(([k,v])=>`<div class='card'><div class='k'>${k}</div><div class='v'>${v}</div></div>`).join('');$('#logs').innerHTML=d.logs.map(l=>`<div class='item'><b>${l.level.toUpperCase()}</b> — ${l.message}<div class='muted'>${f(l.createdAt)}</div></div>`).join('')||'<div class="muted">Нет логов</div>'}
async function loadPosts(){const d=await api('/api/admin/posts?q='+encodeURIComponent($('#qPost').value||''));$('#postList').innerHTML=d.posts.map(p=>`<div class='item'><b>#${p.id}</b> ${p.author} ${p.username}<div>${(p.text||'').replace(/</g,'&lt;')}</div><div class='muted'>${f(p.createdAt)}</div><div class='row'><button class='danger' onclick='postDel(${p.id})'>Удалить (архив)</button></div>${(p.comments||[]).map(c=>`<div class='item' style='margin-top:6px'>${c.text.replace(/</g,'&lt;')}<div class='row'><button class='danger' onclick='comDel(${c.id})'>Удалить комментарий</button></div></div>`).join('')}</div>`).join('')||'<div class="muted">Пусто</div>';
$('#arch').innerHTML=d.archived.map(a=>`<div class='item'>Пост #${a.post.id}<div class='muted'>до ${f(a.restoreUntil)}</div><button class='ok' onclick='postRestore(${a.post.id})'>Восстановить</button></div>`).join('')||'<div class="muted">Архив пуст</div>'}
const postDel=async id=>{await api('/api/admin/posts/'+id,{method:'DELETE'});loadPosts();loadHome()}; const postRestore=async id=>{await api('/api/admin/posts/'+id+'/restore',{method:'POST'});loadPosts()}; const comDel=async id=>{await api('/api/admin/comments/'+id,{method:'DELETE'});loadPosts()};
async function loadUsers(){const d=await api('/api/admin/users?q='+encodeURIComponent($('#qUser').value||''));$('#userList').innerHTML=d.users.map(u=>{const banned=!!(u.tempBanUntil||u.permanentBanReason);return `<div class='item'><b>${u.displayName}</b> @${u.username}${u.verified?`<img class='badge' src='/${u.verificationBadge}'>`:''}<div class='muted'>temp: ${u.tempBanUntil||'-'} | perm: ${u.permanentBanReason||'-'}</div><div class='row'>
<button onclick="verify('${u.id}',${!u.verified})">${u.verified?'Снять вериф':'Верифицировать'}</button>
<button onclick="tban('${u.id}')">Временный бан</button>
${banned?`<button class='ok' onclick="unban('${u.id}')">Разбан</button>`:''}
<button class='danger' onclick="pban('${u.id}')">Перманентный бан</button></div></div>`}).join('')||'<div class="muted">Пусто</div>'}
const verify=(id,v)=>api(`/api/admin/users/${id}/verify`,{method:'POST',body:JSON.stringify({verified:v})}).then(loadUsers);
async function tban(id){const reason=prompt('Причина');if(reason===null)return;const h=Number(prompt('Часов','24'));if(!h||h<1)return;await api(`/api/admin/users/${id}/temp-ban`,{method:'POST',body:JSON.stringify({reason,until:new Date(Date.now()+h*3600e3).toISOString()})});loadUsers();loadHome()}
async function pban(id){const reason=prompt('Причина');if(!reason)return;await api(`/api/admin/users/${id}/permanent-ban`,{method:'POST',body:JSON.stringify({reason})});loadUsers();loadHome()}
const unban=id=>api(`/api/admin/users/${id}/unban`,{method:'POST'}).then(()=>{loadUsers();loadHome()});
async function loadPre(){const d=await api('/api/admin/preverify');$('#preList').innerHTML=d.usernames.map(u=>`<div class='item'>@${u} <button class='danger' onclick="preDel('${u}')">Удалить</button></div>`).join('')||'<div class="muted">Пусто</div>'}
const preAdd=async()=>{const u=$('#preIn').value.trim();if(!u)return;await api('/api/admin/preverify',{method:'POST',body:JSON.stringify({username:u})});$('#preIn').value='';loadPre()}; const preDel=u=>api('/api/admin/preverify/'+encodeURIComponent(u),{method:'DELETE'}).then(loadPre);
async function loadMod(){const [ks,ls]=await Promise.all([api('/api/admin/moderators'),api('/api/admin/moderator-logs')]);$('#mkList').innerHTML=ks.keys.map(k=>{const code=(k.accessCode||k.id);return `<div class='item'><b>${k.alias}</b><div class='muted' style='cursor:pointer' onclick="copyCode('${code}')">${code}</div><div class='row'><button onclick="renameKey('${k.id}')">Переименовать</button><button onclick="copyCode('${code}')">Копировать код</button><button class='danger' onclick="revoke('${k.id}')">Удалить</button></div></div>`}).join('')||'<div class="muted">Нет ключей</div>';
$('#mLogs').innerHTML=ls.logs.map(l=>`<div class='item'><b>${l.actor}</b> — ${l.action}<div class='muted'>${f(l.createdAt)}</div></div>`).join('')||'<div class="muted">Нет логов</div>'}
async function mkCreate(){const alias=$('#alias').value.trim();if(!alias)return;const d=await api('/api/admin/moderators',{method:'POST',body:JSON.stringify({alias})});await navigator.clipboard.writeText(d.plainKey).catch(()=>{});alert('Ключ скопирован: '+d.plainKey);$('#alias').value='';loadMod()}
const renameKey=async id=>{const alias=prompt('Новый псевдоним');if(!alias)return;await api('/api/admin/moderators/'+id,{method:'PATCH',body:JSON.stringify({alias})});loadMod()};
const revoke=id=>api('/api/admin/moderators/'+id,{method:'DELETE'}).then(loadMod);
const copyCode=async(code)=>{await navigator.clipboard.writeText(code).catch(()=>{});alert('Скопировано: '+code)};
async function init(){nav();await Promise.all([loadHome(),loadPosts(),loadUsers(),loadPre(),loadMod()]);setInterval(()=>{loadHome().catch(()=>{});loadUsers().catch(()=>{});loadMod().catch(()=>{});},5000)}
if(localStorage.getItem(TK)){document.getElementById('login').classList.add('hidden');init().catch(()=>localStorage.removeItem(TK))}
</script>
</body></html>
