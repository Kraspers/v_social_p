<!doctype html>
<html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>VP Moderator</title>
<style>
:root{--bg:#0b0b0d;--panel:#121318;--line:rgba(255,255,255,.07);--soft:#1a1d24;--txt:#e8ebf0;--muted:#9aa3b2;--acc:#0d7eff;--danger:#ff4d57;--ok:#31c46d}
*{box-sizing:border-box;font-family:Inter,system-ui,sans-serif}body{margin:0;background:var(--bg);color:var(--txt)}
.app{display:grid;grid-template-columns:252px 1fr;min-height:100vh}.side{padding:14px;border-right:1px solid var(--line);background:rgba(15,16,20,.92)}.brand{font-size:20px;font-weight:800;margin:8px 8px 16px}.nav button{all:unset;display:block;width:100%;cursor:pointer;padding:11px 12px;border-radius:12px;color:var(--muted);margin-bottom:6px}.nav button.active{background:rgba(13,126,255,.15);color:#fff}
.main{padding:18px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px;margin-top:12px}.row{display:flex;gap:8px;flex-wrap:wrap}input,button{background:var(--soft);border:1px solid var(--line);color:var(--txt);border-radius:11px;padding:10px}button{cursor:pointer}.primary{background:linear-gradient(135deg,#0d7eff,#23d4f9);border:none;color:#fff}.danger{background:rgba(255,77,87,.16);border-color:rgba(255,77,87,.45)}.ok{background:rgba(49,196,109,.16);border-color:rgba(49,196,109,.45)}
.g{flex:1}.list{display:flex;flex-direction:column;gap:8px;max-height:67vh;overflow:auto}.item{background:#171a21;border:1px solid var(--line);border-radius:11px;padding:10px}.muted{color:var(--muted);font-size:12px}.hidden{display:none!important}
.login{position:fixed;inset:0;background:rgba(7,8,12,.96);display:flex;align-items:center;justify-content:center;z-index:30}.login-box{width:min(420px,92vw);background:var(--panel);border:1px solid var(--line);border-radius:15px;padding:16px}
@media(max-width:900px){.app{grid-template-columns:1fr}}
</style></head><body>
<div class="login" id="login"><div class="login-box"><h2>Вход модератора</h2><div class="row"><input id="k" class="g" placeholder="Ключ MDR-..."><button class="primary" onclick="login()">Войти</button></div><p id="e" class="muted"></p></div></div>
<div class="app"><aside class="side"><div class="brand">VP Moderator</div><div class="muted" id="hello"></div><nav class="nav"><button data-t="posts" class="active">Посты</button><button data-t="users">Пользователи</button></nav></aside>
<main class="main"><section id="posts"><div class="row"><input id="qPost" class="g" placeholder="Поиск по постам"><button class="primary" onclick="loadPosts()">Найти</button></div><div class="panel"><div id="postList" class="list"></div></div></section>
<section id="users" class="hidden"><div class="row"><input id="qUser" class="g" placeholder="Поиск пользователей"><button class="primary" onclick="loadUsers()">Найти</button></div><div class="panel"><div id="userList" class="list"></div></div></section></main></div>
<script>
const TK='vp_mod_token'; const $=s=>document.querySelector(s); const f=v=>new Date(v).toLocaleString('ru-RU');
const api=async(u,o={})=>{const r=await fetch(u,{...o,headers:{'Content-Type':'application/json','Authorization':'Bearer '+(localStorage.getItem(TK)||'')}});const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||'Ошибка');return d};
async function login(){try{const d=await fetch('/api/mod/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:$('#k').value.trim()})}).then(r=>r.json());if(!d.token)throw new Error(d.error||'Ошибка');localStorage.setItem(TK,d.token);$('#login').classList.add('hidden');init()}catch(e){$('#e').textContent=e.message}}
function nav(){document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.getElementById('posts').classList.toggle('hidden',b.dataset.t!=='posts');document.getElementById('users').classList.toggle('hidden',b.dataset.t!=='users')})}
async function loadPosts(){const d=await api('/api/admin/posts?q='+encodeURIComponent($('#qPost').value||''));$('#postList').innerHTML=d.posts.map(p=>`<div class='item'><b>#${p.id}</b> ${p.author} ${p.username}<div>${(p.text||'').replace(/</g,'&lt;')}</div><div class='muted'>${f(p.createdAt)}</div><button class='danger' onclick='postDel(${p.id})'>Удалить пост</button>${(p.comments||[]).map(c=>`<div class='item' style='margin-top:6px'>${c.text.replace(/</g,'&lt;')}<button class='danger' onclick='comDel(${c.id})'>Удалить комментарий</button></div>`).join('')}</div>`).join('')||'<div class="muted">Пусто</div>'}
const postDel=id=>api('/api/admin/posts/'+id,{method:'DELETE'}).then(loadPosts); const comDel=id=>api('/api/admin/comments/'+id,{method:'DELETE'}).then(loadPosts);
async function loadUsers(){const d=await api('/api/admin/users?q='+encodeURIComponent($('#qUser').value||''));$('#userList').innerHTML=d.users.map(u=>{const banned=!!(u.tempBanUntil||u.permanentBanReason);return `<div class='item'><b>${u.displayName}</b> @${u.username}<div class='muted'>temp: ${u.tempBanUntil||'-'}</div><div class='row'><button onclick="tban('${u.id}')">Временный бан</button>${banned?`<button class='ok' onclick="unban('${u.id}')">Разбан</button>`:''}</div></div>`}).join('')||'<div class="muted">Пусто</div>'}
async function tban(id){const reason=prompt('Причина');if(reason===null)return;const h=Number(prompt('Часов','24'));if(!h||h<1)return;await api(`/api/admin/users/${id}/temp-ban`,{method:'POST',body:JSON.stringify({reason,until:new Date(Date.now()+h*3600e3).toISOString()})});loadUsers()}
const unban=id=>api(`/api/admin/users/${id}/unban`,{method:'POST'}).then(loadUsers);
async function init(){nav();const me=await api('/api/mod/me');$('#hello').textContent='С возвращением, '+me.alias+'!';await Promise.all([loadPosts(),loadUsers()]);setInterval(()=>{loadPosts().catch(()=>{});loadUsers().catch(()=>{});},5000)}
if(localStorage.getItem(TK)){document.getElementById('login').classList.add('hidden');init().catch(()=>localStorage.removeItem(TK))}
</script></body></html>
