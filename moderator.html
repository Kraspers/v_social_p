<!doctype html>
<html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>VP Moderator</title>
<style>
:root{--bg:#0b0b0d;--panel:#14161a;--soft:#1b1e24;--text:#e8ebf0;--muted:#9aa3b2;--danger:#ff4d57}
*{box-sizing:border-box;font-family:Inter,system-ui,sans-serif} body{margin:0;background:var(--bg);color:var(--text)}
.wrap{max-width:1100px;margin:0 auto;padding:16px}.tabs{display:flex;gap:8px;margin:12px 0}.tabs button{padding:10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.15);background:#151922;color:#fff;cursor:pointer}.tabs button.active{background:#0d7eff}
.panel{background:var(--panel);border:1px solid rgba(255,255,255,.08);padding:12px;border-radius:12px;margin:10px 0}.list{display:flex;flex-direction:column;gap:8px;max-height:70vh;overflow:auto}
.item{background:#171a20;border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:10px}.row{display:flex;gap:8px;flex-wrap:wrap}.grow{flex:1}
input,button{background:var(--soft);border:1px solid rgba(255,255,255,.1);color:var(--text);padding:10px;border-radius:10px}button{cursor:pointer}.danger{background:rgba(255,77,87,.2);border-color:rgba(255,77,87,.5)}
.hidden{display:none!important}.login{position:fixed;inset:0;background:rgba(5,7,11,.96);display:flex;align-items:center;justify-content:center}.login-box{width:min(420px,92vw);background:var(--panel);padding:16px;border-radius:14px}.muted{color:var(--muted);font-size:12px}
</style></head><body>
<div class='login' id='loginBox'><div class='login-box'><h2>Вход модератора</h2><p class='muted'>Вставь ключ доступа, созданный админом.</p><div class='row'><input id='modKey' class='grow' placeholder='MDR-...'><button onclick='modLogin()'>Войти</button></div><p id='err' class='muted'></p></div></div>
<div class='wrap'>
<h2 id='welcome'>С возвращением!</h2>
<div class='tabs'><button class='active' data-tab='posts'>Посты</button><button data-tab='users'>Пользователи</button></div>
<section id='posts' class='tab'><div class='row'><input id='postSearch' class='grow' placeholder='Поиск по постам'><button onclick='loadPosts()'>Найти</button></div><div class='panel'><div id='postList' class='list'></div></div></section>
<section id='users' class='tab hidden'><div class='row'><input id='userSearch' class='grow' placeholder='Поиск пользователей'><button onclick='loadUsers()'>Найти</button></div><div class='panel'><div id='userList' class='list'></div></div></section>
</div>
<script>
const tokenKey='vp_mod_token'; const $=s=>document.querySelector(s);const fmt=v=>new Date(v).toLocaleString('ru-RU');
async function api(url,opt={}){const res=await fetch(url,{...opt,headers:{'Content-Type':'application/json','Authorization':'Bearer '+(localStorage.getItem(tokenKey)||'')}});const data=await res.json().catch(()=>({}));if(!res.ok)throw new Error(data.error||'Ошибка');return data;}
async function modLogin(){try{const key=$('#modKey').value.trim();const d=await fetch('/api/mod/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key})}).then(r=>r.json());if(!d.token) throw new Error(d.error||'Ошибка');localStorage.setItem(tokenKey,d.token);$('#loginBox').classList.add('hidden');init();}catch(e){$('#err').textContent=e.message;}}
function tabs(){document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.querySelectorAll('.tab').forEach(t=>t.classList.add('hidden'));$('#'+b.dataset.tab).classList.remove('hidden');});}
async function init(){tabs();const me=await api('/api/mod/me');$('#welcome').textContent=`С возвращением, ${me.alias}!`;await Promise.all([loadPosts(),loadUsers()]);setInterval(()=>loadPosts().catch(()=>{}),7000)}
async function loadPosts(){const q=encodeURIComponent($('#postSearch').value||'');const d=await api('/api/admin/posts?q='+q);$('#postList').innerHTML=d.posts.map(p=>`<div class='item'><b>#${p.id}</b> ${p.author} ${p.username}<div>${(p.text||'').replace(/</g,'&lt;')}</div><div class='muted'>${fmt(p.createdAt)}</div><button class='danger' onclick='deletePost(${p.id})'>Удалить пост</button><div class='list'>${p.comments.map(c=>`<div class='item'>${c.text.replace(/</g,'&lt;')} <button class='danger' onclick='deleteComment(${c.id})'>Удалить комментарий</button></div>`).join('')}</div></div>`).join('')||'<div class="muted">Постов нет</div>'}
async function deletePost(id){await api('/api/admin/posts/'+id,{method:'DELETE'});loadPosts();}
async function deleteComment(id){await api('/api/admin/comments/'+id,{method:'DELETE'});loadPosts();}
async function loadUsers(){const q=encodeURIComponent($('#userSearch').value||'');const d=await api('/api/admin/users?q='+q);$('#userList').innerHTML=d.users.map(u=>`<div class='item'><b>${u.displayName}</b> @${u.username}<div class='muted'>tempBan: ${u.tempBanUntil||'-'}</div><button onclick='tempBan("${u.id}")'>Временный бан</button><button onclick='unban("${u.id}")'>Разбан</button></div>`).join('')}
async function tempBan(id){const reason=prompt('Причина бана'); if(reason===null)return; const h=Number(prompt('Часов бана', '24')); if(!h||h<1)return; await api(`/api/admin/users/${id}/temp-ban`,{method:'POST',body:JSON.stringify({reason,until:new Date(Date.now()+h*3600*1000).toISOString()})});loadUsers();}
async function unban(id){await api(`/api/admin/users/${id}/unban`,{method:'POST'});loadUsers();}
if(localStorage.getItem(tokenKey)){ $('#loginBox').classList.add('hidden'); init().catch(()=>localStorage.removeItem(tokenKey)); }
</script>
</body></html>
